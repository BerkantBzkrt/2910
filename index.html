<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Senin İçin ❤️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    color:white;
}

.container{
    margin-top:100px;
}

h1{
    font-size:50px;
}

p{
    font-size:22px;
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4b6e;
    cursor:pointer;
}

button:hover{
    transform:scale(1.1);
}

.heart{
    position:fixed;
    top:-10px;
    color:red;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh);
    }
}
</style>

</head>

<body>

<div class="container">
<h1>❤️ Seni Seviyorum ❤️</h1>

<p>
Hayatıma girdiğin günden beri her şey daha güzel.  
Bu küçük site sadece sana özel.  
</p>

<p>
İyi ki varsın sevgilim 💕
</p>

<button onclick="mesaj()">Bana Tıkla</button>

<p id="yazi"></p>

</div>

<script>

function mesaj(){
document.getElementById("yazi").innerHTML="Sen benim en güzel hikayemsin ❤️";
}

function kalp(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);
}

setInterval(kalp,300);

</script>

</body>
</html>
